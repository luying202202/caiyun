version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: caiyun_mysql
    restart: always
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --init-connect='SET NAMES utf8mb4'
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-caiyun123}
      MYSQL_DATABASE: ${DB_NAME:-caiyun}
      MYSQL_USER: ${DB_USER:-caiyun}
      MYSQL_PASSWORD: ${DB_PASSWORD:-caiyun123}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init_data.sql:/docker-entrypoint-initdb.d/01_init_data.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    image: caiyun:latest
    build: .
    container_name: caiyun_app
    restart: always
    ports:
      - "${SERVER_PORT:-5000}:5000"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-caiyun}
      DB_USER: ${DB_USER:-caiyun}
      DB_PASSWORD: ${DB_PASSWORD:-caiyun123}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-5}
      CACHE_INTERVAL: ${CACHE_INTERVAL:-60}
      SERVER_PORT: 5000
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
